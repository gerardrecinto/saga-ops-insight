spring.application.name=signal-harbor-insight
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/signal_harbor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:signalharbor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:signalharbor}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

signal-harbor.api-key=${SIGNAL_HARBOR_API_KEY:dev-api-key}
signal-harbor.risk-lookback-hours=${SIGNAL_HARBOR_RISK_LOOKBACK_HOURS:24}
